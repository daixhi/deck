<!DOCTYPE html>
<html lang="en">

  <meta charset="UTF-8" />

  <title>jhana.ai for Tax Audit — Problem Set Response</title>

  <link
    href="https://fonts.googleapis.com/css2?family=IBM+Plex+Serif:ital,wght@0,400;0,500;0,600;1,400&family=JetBrains+Mono:wght@400;500;600;700;800&display=swap"
    rel="stylesheet">
  <style>
    :root {
      --bg-0: #090A14;
      --ink: #F0F1F6;
      --ink-dim: rgba(240, 241, 246, 0.65);
      --ink-faint: rgba(160, 166, 184, 0.45);
      --line: rgba(255, 255, 255, 0.08);
      --accent: #D926A9;
      --accent-bg: rgba(217, 38, 169, 0.1);
      --accent-border: rgba(217, 38, 169, 0.25);
    }

    * {
      box-sizing: border-box;
    }

    html,
    body {
      margin: 0;
      padding: 0;
      height: 100%;
      background: var(--bg-0);
      overflow: hidden;
    }

    body {
      font-family: "IBM Plex Serif", Georgia, serif;
      color: var(--ink);
    }

    .bar {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      height: 56px;
      z-index: 50;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 20px;
      background: rgba(9, 10, 20, 0.9);
      backdrop-filter: blur(10px);
      border-bottom: 1px solid var(--line);
    }

    .brand {
      font-family: "JetBrains Mono", monospace;
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: var(--ink);
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .brand .dim {
      color: var(--ink-faint);
      font-weight: 500;
    }

    .steps {
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .step-btn {
      font-family: "JetBrains Mono", monospace;
      font-size: 10px;
      font-weight: 600;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: var(--ink-faint);
      background: rgba(255, 255, 255, 0.02);
      border: 1px solid var(--line);
      border-radius: 999px;
      padding: 7px 14px;
      cursor: pointer;
      transition: all .15s ease;
      white-space: nowrap;
    }

    .step-btn:hover {
      color: var(--ink);
      border-color: rgba(255, 255, 255, 0.18);
    }

    .step-btn.active {
      color: #4CAF7D;
      background: rgba(76, 175, 125, 0.1);
      border-color: rgba(76, 175, 125, 0.25);
    }

    .nav-arrows {
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .arrow {
      width: 32px;
      height: 32px;
      border-radius: 50%;
      border: 1px solid var(--line);
      background: rgba(255, 255, 255, 0.02);
      color: var(--ink);
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 14px;
      transition: all .15s ease;
    }

    .arrow:hover {
      border-color: var(--accent-border);
      color: var(--accent);
    }

    .arrow:disabled {
      opacity: 0.25;
      cursor: default;
    }

    .arrow:disabled:hover {
      border-color: var(--line);
      color: var(--ink);
    }

    .counter {
      font-family: "JetBrains Mono", monospace;
      font-size: 11px;
      color: var(--ink-faint);
      min-width: 40px;
      text-align: center;
    }

    .stage {
      position: absolute;
      top: 56px;
      left: 0;
      right: 0;
      bottom: 0;
    }

    .stage iframe {
      width: 100%;
      height: 100%;
      border: 0;
      display: block;
      background: var(--bg-0);
    }

    .jhana-line {
      fill: none;
      stroke: #4CAF7D;
      stroke-width: 35;
      stroke-linecap: round;
      opacity: 0;
    }

    .jhana-fill-path {
      fill: #4CAF7D;
      opacity: 1;
    }

    .jhana-dot-path {
      fill: #4CAF7D;
      opacity: 1;
      transform-box: fill-box;
      transform-origin: center;
    }

    @media (max-width: 900px) {
      .step-btn span.full {
        display: none;
      }

      .brand .dim {
        display: none;
      }
    }
  </style>
</head>

      jhana.ai <span class="dim">— Tax Audit Problem Set</span>
    </div>

    <div class="steps" id="steps">
      <button class="step-btn active" data-i="0"> <span class="full">· First Principles</span></button>
      <button class="step-btn" data-i="1"> <span class="full">· Execution Model</span></button>
      <button class="step-btn" data-i="2"> <span class="full">· Evidence Graph</span></button>
      <button class="step-btn" data-i="3"> <span class="full">· Systemic advantage</span></button>
    </div>

    <div class="nav-arrows">
      <div class="counter" id="counter">1 / 4</div>
      <button class="arrow" id="prev" aria-label="Previous">&#8592;</button>
      <button class="arrow" id="next" aria-label="Next">&#8594;</button>
    </div>
  </div>

  <div class="stage">
    <iframe id="frame" src="1-isomorphism.html" title="jhana.ai deck page"></iframe>
  </div>

  <script>
    const pages = [
      "1-isomorphism.html",
      "2-role-journey.html",
      "3-form26-map.html",
      "4-gtm-advantage.html"
    ];
    let current = 0;
    const frame = document.getElementById('frame');
    const counter = document.getElementById('counter');
    const prevBtn = document.getElementById('prev');
    const nextBtn = document.getElementById('next');
    const buttons = document.querySelectorAll('.step-btn');

    function goTo(i) {
      current = Math.max(0, Math.min(pages.length - 1, i));
      frame.src = pages[current];
      counter.textContent = (current + 1) + ' / ' + pages.length;
      buttons.forEach((b, idx) => b.classList.toggle('active', idx === current));
      prevBtn.disabled = current === 0;
      nextBtn.disabled = current === pages.length - 1;
    }

    buttons.forEach(b => b.addEventListener('click', () => goTo(parseInt(b.dataset.i, 10))));
    prevBtn.addEventListener('click', () => goTo(current - 1));
    nextBtn.addEventListener('click', () => goTo(current + 1));
    document.addEventListener('keydown', (e) => {
      if (e.key === 'ArrowRight') goTo(current + 1);
      if (e.key === 'ArrowLeft') goTo(current - 1);
    });

    goTo(0);

    const jhanaBrand = document.querySelector('.brand');
    const jhanaIcon = document.getElementById('jhana-icon');
    const jhanaLine = document.getElementById('jhana-line');
    const jhanaFillPath = document.getElementById('jhana-fill-path');
    const jhanaDotPath = document.getElementById('jhana-dot-path');
    let isJhanaAnimating = false;

    function runJhanaAnimation() {
      if (isJhanaAnimating) return;
      isJhanaAnimating = true;

      const len = jhanaLine.getTotalLength();
      jhanaLine.style.transition = 'none';
      jhanaLine.style.strokeDasharray = len;
      jhanaLine.style.strokeDashoffset = len;
      jhanaLine.style.opacity = 1;
      
      jhanaFillPath.style.transition = 'none';
      jhanaFillPath.style.opacity = 0;
      
      jhanaDotPath.style.transition = 'none';
      jhanaDotPath.style.opacity = 0;
      jhanaDotPath.style.transform = 'scale(0.4)';

      requestAnimationFrame(() => requestAnimationFrame(() => {
        jhanaLine.style.transition = 'stroke-dashoffset 1.6s ease-in-out';
        jhanaLine.style.strokeDashoffset = '0';

        setTimeout(() => {
          jhanaFillPath.style.transition = 'opacity .2s linear';
          jhanaFillPath.style.opacity = 1;
        }, 1600);

        setTimeout(() => {
          jhanaLine.style.transition = 'opacity .2s linear';
          jhanaLine.style.opacity = 0;
        }, 1800);

        setTimeout(() => {
          jhanaDotPath.style.transition = 'opacity .3s ease, transform .3s cubic-bezier(.34,1.56,.64,1)';
          jhanaDotPath.style.opacity = 1;
          jhanaDotPath.style.transform = 'scale(1)';
        }, 1900);
        
        setTimeout(() => {
          isJhanaAnimating = false;
        }, 2200);
      }));
    }

    if (jhanaBrand && jhanaIcon) {
      jhanaBrand.addEventListener('mouseenter', runJhanaAnimation);
      jhanaBrand.style.cursor = 'pointer';
    }
  </script>
