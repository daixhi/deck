      background: #0d0d0d;
    }

    .wrap {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 24px;
    }

    svg {
      width: 320px;
      height: auto;
      overflow: visible;
    }

    /* Single line, traced along the real centerline of the icon shape */
    .line {
      fill: none;
      stroke: #4CAF7D;
      stroke-width: 35;
      stroke-linecap: round;
      opacity: 0; /* Prevent FOUC before JS runs */
    }

    .fill-path {
      fill: #4CAF7D;
      opacity: 0;
    }

    .dot-path {
      fill: #4CAF7D;
      opacity: 0;
      transform-box: fill-box;
      transform-origin: center;
    }

    button {
      font-family: system-ui, sans-serif;
      font-size: 14px;
      padding: 8px 18px;
      border-radius: 999px;
      border: 1px solid #4CAF7D;
      background: transparent;
      color: #4CAF7D;
      cursor: pointer;
    }
  </style>
</head>

    <button id="replay">Replay</button>
  </div>

  <script>
    const line = document.getElementById('line');
    const fillPath = document.getElementById('fill-path');
    const dotPath = document.getElementById('dot-path');
    const replayBtn = document.getElementById('replay');

    function run() {
      const len = line.getTotalLength();
      line.style.transition = 'none';
      line.style.strokeDasharray = len;
      line.style.strokeDashoffset = len;
      line.style.opacity = 1;
      fillPath.style.transition = 'none';
      fillPath.style.opacity = 0;
      dotPath.style.transition = 'none';
      dotPath.style.opacity = 0;
      dotPath.style.transform = 'scale(0.4)';

      requestAnimationFrame(() => requestAnimationFrame(() => {
        line.style.transition = 'stroke-dashoffset 1.6s ease-in-out';
        line.style.strokeDashoffset = '0';

        setTimeout(() => {
          fillPath.style.transition = 'opacity .2s linear';
          fillPath.style.opacity = 1;
        }, 1600); // Start fading in exactly when stroke ends

        setTimeout(() => {
          line.style.transition = 'opacity .2s linear';
          line.style.opacity = 0;
        }, 1800); // Fade out stroke only after fill is fully opaque

        setTimeout(() => {
          dotPath.style.transition = 'opacity .3s ease, transform .3s cubic-bezier(.34,1.56,.64,1)';
          dotPath.style.opacity = 1;
          dotPath.style.transform = 'scale(1)';
        }, 1900);
      }));
    }

    run();
    replayBtn.addEventListener('click', run);
  </script>
